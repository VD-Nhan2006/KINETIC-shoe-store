<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KINETIC - Đăng ký</title>
  <link href="../assets/css/bootstrap.min.css" rel="stylesheet">
  <style>
    @font-face {
      font-family: "BeVietnamPro";
      src: url("../assets/fonts/BeVietnamPro-Regular.woff") format("woff");
      font-weight: 400;
    }
    @font-face {
      font-family: "BeVietnamPro";
      src: url("../assets/fonts/BeVietnamPro-Medium.woff") format("woff");
      font-weight: 500;
    }
    @font-face {
      font-family: "BeVietnamPro";
      src: url("../assets/fonts/BeVietnamPro-Bold.woff") format("woff");
      font-weight: 700;
    }

    :root {
      --bg: #0c1609;
      --panel: rgba(30, 30, 30, 0.6);
      --line: rgba(255, 255, 255, 0.1);
      --line-soft: rgba(255, 255, 255, 0.06);
      --text: #efffe3;
      --muted: rgba(255, 255, 255, 0.6);
      --muted-2: rgba(255, 255, 255, 0.4);
      --placeholder: #6b7280;
      --neon: #39ff14;
      --neon-dark: #053900;
    }

    body {
      margin: 0;
      font-family: "BeVietnamPro", Arial, sans-serif;
      background: var(--bg);
      color: #fff;
      min-height: 100vh;
    }

    .top-nav {
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(12px);
      background: rgba(18, 18, 18, 0.8);
      border-bottom: 1px solid #1e1e1e;
      box-shadow: 0 0 10px rgba(57, 255, 20, 0.05);
    }
    .brand {
      color: var(--neon);
      text-decoration: none;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -1px;
    }
    .login-link {
      color: var(--neon);
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .main-wrap {
      position: relative;
      min-height: 100vh;
      padding: 128px 16px 80px;
      overflow: visible;
      background:
        radial-gradient(380px 400px at 0% 0%, rgba(57, 255, 20, 0.05) 0%, rgba(57, 255, 20, 0) 60%),
        radial-gradient(380px 400px at 100% 100%, rgba(57, 255, 20, 0.05) 0%, rgba(57, 255, 20, 0) 60%);
    }

    .glow-1,
    .glow-2 {
      position: absolute;
      max-width: 100%;
      border-radius: 999px;
      filter: blur(60px);
      background: rgba(57, 255, 20, 0.05);
      pointer-events: none;
    }
    .glow-1 {
      left: -80px;
      top: 24%;
      bottom: 60%;
    }
    .glow-2 {
      right: -80px;
      top: 60%;
      bottom: 24%;
    }

    .register-card {
      width: 100%;
      max-width: 576px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
      padding: 48px;
      border-radius: 16px;
      background: var(--panel);
      border: 1px solid var(--line);
      backdrop-filter: blur(10px);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }

    .title {
      text-align: center;
      margin: 0;
      font-size: clamp(30px, 5vw, 40px);
      line-height: 1.2;
      text-transform: uppercase;
      letter-spacing: -1.4px;
      color: var(--text);
      font-weight: 700;
    }
    .subtitle {
      text-align: center;
      color: var(--muted);
      margin: 8px 0 34px;
      font-size: 15px;
    }

    .field-label {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1.4px;
      color: var(--muted-2);
      margin-bottom: 4px;
      display: block;
    }
    .field-input {
      width: 100%;
      height: 50px;
      background: #1e1e1e;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
      padding: 0 16px;
      outline: none;
    }
    .field-input::placeholder {
      color: var(--placeholder);
    }
    .field-input:focus {
      border-color: rgba(57, 255, 20, 0.45);
    }

    .checkbox-row {
      display: flex;
      align-items: flex-start;
      margin-top: 4px;
      margin-bottom: 4px;
    }
    .checkbox-row input {
      width: 20px;
      height: 20px;
      margin-top: 2px;
      margin-right: 12px;
      accent-color: var(--neon);
    }
    .checkbox-row label {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
    }
    .checkbox-row a {
      color: var(--neon);
      text-decoration: underline;
    }

    .btn-register {
      width: 100%;
      height: 58px;
      border: 0;
      border-radius: 8px;
      background: var(--neon);
      color: var(--neon-dark);
      font-size: 24px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: -0.8px;
      margin-top: 8px;
    }
    .btn-register:hover {
      filter: brightness(0.96);
    }

    .or-wrap {
      margin: 28px 0;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .or-wrap::before,
    .or-wrap::after {
      content: "";
      flex: 1;
      border-top: 1px solid var(--line);
    }
    .or-wrap span {
      color: rgba(255, 255, 255, 0.3);
      text-transform: uppercase;
      font-size: 14px;
      white-space: nowrap;
    }

    .social-btn {
      height: 58px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      color: rgba(255, 255, 255, 0.8);
      font-size: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
      transition: all 0.2s ease;
      width: 100%;
    }
    .social-btn:hover {
      color: var(--neon);
      border-color: rgba(57, 255, 20, 0.4);
      background: rgba(57, 255, 20, 0.08);
    }
    .social-btn img {
      width: 20px;
      height: 20px;
      object-fit: contain;
    }

    .signin-row {
      text-align: center;
      color: var(--muted-2);
      font-size: 16px;
      margin-top: 26px;
    }
    .signin-row a {
      color: var(--neon);
      text-decoration: none;
      font-weight: 700;
    }

    .footer {
      border-top: 1px solid #1e1e1e;
      background: #121212;
      padding: 48px 16px;
    }
    .footer-inner {
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .footer-brand {
      color: rgba(255, 255, 255, 0.2);
      font-size: 18px;
      font-weight: 700;
    }
    .footer-links a,
    .footer-copy {
      color: rgba(255, 255, 255, 0.4);
      text-decoration: none;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: -0.2px;
    }
    .footer-links {
      display: flex;
      gap: 24px;
    }

    @media (max-width: 767px) {
      .main-wrap {
        min-height: auto;
        padding: 96px 12px 80px;
      }
      .register-card {
        padding: 28px 18px;
      }
      .btn-register {
        font-size: 20px;
      }
      .social-btn {
        height: 50px;
      }
    }
  </style>
</head>
<body>
  <header class="top-nav">
    <div class="container-fluid px-4 py-3 d-flex align-items-center justify-content-between">
      <a href="./index.html" class="brand">KINETIC</a>
      <a href="./login.html" class="login-link">Đăng nhập</a>
    </div>
  </header>

  <main class="main-wrap">
    <div class="glow-1"></div>
    <div class="glow-2"></div>

    <section class="register-card">
      <h1 class="title">Gia nhập Kinetic</h1>
      <p class="subtitle">Trải nghiệm đỉnh cao công nghệ giày chạy bộ</p>

      <form id="registerForm" novalidate>
        <div class="mb-3">
          <label class="field-label" for="fullName">Họ và tên</label>
          <input id="fullName" class="field-input" type="text" placeholder="Nguyễn Văn A" required>
        </div>
        <div class="mb-3">
          <label class="field-label" for="email">Email</label>
          <input id="email" class="field-input" type="email" placeholder="example@kinetic.com" required>
        </div>
        <div class="mb-3">
          <label class="field-label" for="phone">Số điện thoại</label>
          <input id="phone" class="field-input" type="tel" placeholder="0900 000 000" required>
        </div>

        <div class="row g-3 mb-3">
          <div class="col-md-6">
            <label class="field-label" for="password">Mật khẩu</label>
            <input id="password" class="field-input" type="password" placeholder="••••••••" required>
          </div>
          <div class="col-md-6">
            <label class="field-label" for="confirmPassword">Xác nhận mật khẩu</label>
            <input id="confirmPassword" class="field-input" type="password" placeholder="••••••••" required>
          </div>
        </div>

        <div class="checkbox-row">
          <input id="agree" type="checkbox" required>
          <label for="agree">
            Tôi đồng ý với các <a href="#">Điều khoản</a> và <a href="#">Chính sách</a> của KINETIC.
          </label>
        </div>

        <button class="btn-register" type="submit">Đăng ký</button>
      </form>

      <div class="or-wrap"><span>Hoặc đăng ký bằng</span></div>

      <div class="row g-3">
        <div class="col-6">
          <a class="social-btn" href="#" role="button">
            <img src="https://www.figma.com/api/mcp/asset/04fd454a-2447-49fa-98ff-e577105b7f7e" alt="">
            Google
          </a>
        </div>
        <div class="col-6">
          <a class="social-btn" href="#" role="button">
            <img src="https://www.figma.com/api/mcp/asset/05af8dea-b8e8-428b-b9cb-d58a9b038922" alt="">
            Facebook
          </a>
        </div>
      </div>

      <div class="signin-row">
        Đã có tài khoản?
        <a href="./login.html">Đăng nhập ngay</a>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <span class="footer-brand">KINETIC</span>
      <div class="footer-links">
        <a href="#">Terms of service</a>
        <a href="#">Privacy policy</a>
        <a href="#">Performance specs</a>
        <a href="#">Support</a>
      </div>
      <span class="footer-copy">© 2024 KINETIC ENGINEERING. ALL RIGHTS RESERVED.</span>
    </div>
  </footer>

  <script>
    (function() {
      var form = document.getElementById("registerForm");
      var pass = document.getElementById("password");
      var confirm = document.getElementById("confirmPassword");
      var agree = document.getElementById("agree");

      form.addEventListener("submit", function(e) {
        e.preventDefault();

        if (!form.checkValidity()) {
          alert("Vui lòng nhập đầy đủ thông tin.");
          return;
        }

        if (pass.value !== confirm.value) {
          alert("Mật khẩu xác nhận không khớp.");
          confirm.focus();
          return;
        }

        if (!agree.checked) {
          alert("Bạn cần đồng ý Điều khoản và Chính sách.");
          return;
        }

        alert("Đăng ký thành công (demo).");
        form.reset();
      });
    })();
  </script>
</body>
</html>
